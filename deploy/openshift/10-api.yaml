apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  labels: { app: rag-api, app.kubernetes.io/part-of: rag }
spec:
  replicas: 2
  selector:
    matchLabels: { app: rag-api }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: rag-api }
    spec:
      containers:
        - name: api
          image: image-registry.openshift-image-registry.svc:5000/rag/rag-api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8000 }
          envFrom:
            - configMapRef: { name: rag-config }
            - secretRef: { name: rag-secrets }
          resources:
            # The floor is the ONNX session plus the OpenSearch client pool.
            # 2 CPU matches RAG_EMBEDDING__NUM_THREADS=2 -- if you raise one,
            # raise the other or the thread pool will be throttled.
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "2Gi" }
          startupProbe:
            # Loading the ONNX model takes a few seconds; this window prevents
            # the liveness probe from killing a pod that is merely starting.
            httpGet: { path: /api/v1/health/live, port: http }
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet: { path: /api/v1/health/live, port: http }
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            # Checks OpenSearch, the embedder and Tika. A pod that cannot reach
            # them is pulled from the Service rather than serving errors.
            httpGet: { path: /api/v1/health/ready, port: http }
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            - { name: opensearch-ca, mountPath: /etc/opensearch-ca, readOnly: true }
      volumes:
        # readOnlyRootFilesystem is on, so anything that writes needs an
        # explicit emptyDir. /tmp is used for upload spooling.
        - name: tmp
          emptyDir: { sizeLimit: 2Gi }
        - name: opensearch-ca
          secret:
            secretName: opensearch-ca
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: rag-api
  labels: { app: rag-api }
spec:
  selector: { app: rag-api }
  ports:
    - { name: http, port: 8000, targetPort: http }
---
# There is deliberately NO Route for the API.
#
# The browser talks only to rag-web, which proxies /api/v1/* to this Service
# over cluster DNS. So the API is reachable from inside the namespace and
# nowhere else: one public hostname instead of two, and CORS never enters the
# picture (RAG_API__CORS_ORIGINS stays empty).
#
# If you later need to call the API from outside -- a script, another team,
# /docs -- add a Route here and give it the same SSE timeout annotation the web
# Route carries, or streamed answers will be cut off at the router's 30s default.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-api
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: rag-api }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
