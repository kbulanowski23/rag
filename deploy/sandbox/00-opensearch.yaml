# Single-node OpenSearch, for trying the stack on a cluster that has none.
#
# NOT for production. At work OpenSearch is an existing cluster you point
# RAG_OPENSEARCH__HOSTS at; this exists so the sandbox has something to index
# into. Security plugin off, one node, no replicas.
#
# Two adjustments are needed to run it under OpenShift's restricted SCC, and
# both are the kind of thing you only find by trying:
#
#   node.store.allow_mmap=false
#       OpenSearch defaults to mmapfs and wants vm.max_map_count=262144. Setting
#       a sysctl needs a privileged init container, which restricted-v2 forbids.
#       Turning mmap off trades some performance for not needing host access.
#
#   no runAsUser
#       OpenShift assigns a random UID from the namespace's range. Anything
#       pinning a UID is rejected. fsGroup is likewise assigned automatically,
#       which is what makes the mounted PVC writable.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opensearch-data
  labels: { app: opensearch, app.kubernetes.io/part-of: rag }
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests: { storage: 10Gi }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch
  labels: { app: opensearch, app.kubernetes.io/part-of: rag }
spec:
  replicas: 1
  strategy: { type: Recreate }   # RWO volume: never two pods holding it at once
  selector:
    matchLabels: { app: opensearch }
  template:
    metadata:
      labels: { app: opensearch }
    spec:
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.18.0
          env:
            - { name: discovery.type,                          value: single-node }
            - { name: DISABLE_SECURITY_PLUGIN,                 value: "true" }
            - { name: DISABLE_INSTALL_DEMO_CONFIG,             value: "true" }
            - { name: bootstrap.memory_lock,                   value: "false" }
            - { name: node.store.allow_mmap,                   value: "false" }
            - { name: OPENSEARCH_JAVA_OPTS,                    value: "-Xms1g -Xmx1g" }
            - { name: cluster.routing.allocation.disk.threshold_enabled, value: "false" }
          ports:
            - { name: http, containerPort: 9200 }
          resources:
            requests: { cpu: "200m", memory: 2Gi }
            limits:   { cpu: "1",    memory: 3Gi }
          readinessProbe:
            httpGet: { path: /_cluster/health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /_cluster/health, port: http }
            initialDelaySeconds: 120
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: data, mountPath: /usr/share/opensearch/data }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: opensearch-data }
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  labels: { app: opensearch }
spec:
  selector: { app: opensearch }
  ports:
    - { name: http, port: 9200, targetPort: http }
