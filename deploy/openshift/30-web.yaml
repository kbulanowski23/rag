apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-web
  labels: { app: rag-web, app.kubernetes.io/part-of: rag }
spec:
  replicas: 2
  selector:
    matchLabels: { app: rag-web }
  template:
    metadata:
      labels: { app: rag-web }
    spec:
      containers:
        - name: web
          image: image-registry.openshift-image-registry.svc:5000/rag/rag-web:0.1.0
          ports:
            - { name: http, containerPort: 3000 }
          env:
            - { name: NODE_ENV, value: production }
            - { name: NEXT_TELEMETRY_DISABLED, value: "1" }
            # The browser calls /api/v1/* on this pod and Next proxies it to the
            # API in-cluster. Read per request, so changing it is `oc set env` +
            # a rollout -- no rebuild. Because the traffic never leaves the web
            # origin, the API needs no Route and no CORS entry for this host.
            - name: RAG_API_URL
              valueFrom:
                configMapKeyRef: { name: rag-config, key: RAG_API_URL }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: cache, mountPath: /app/.next/cache }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: cache
          emptyDir: { sizeLimit: 512Mi }
        - name: tmp
          emptyDir: { sizeLimit: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: rag-web
spec:
  selector: { app: rag-web }
  ports:
    - { name: http, port: 3000, targetPort: http }
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: rag-web
  annotations:
    # The SSE chat stream now reaches the browser through THIS route, not the
    # API's, because the web pod proxies /api/v1/*. Without this the router's
    # 30s default closes the connection mid-answer on any slow generation and
    # it looks like the model stopped talking. Must stay >= RAG_LLM__TIMEOUT_S.
    haproxy.router.openshift.io/timeout: 300s
spec:
  to: { kind: Service, name: rag-web }
  port: { targetPort: http }
  tls: { termination: edge, insecureEdgeTerminationPolicy: Redirect }
