# Sandbox values. Everything here is a value, not a code path -- which is the
# point: the same images run at work against LiteLLM and a real OpenSearch,
# with only these strings different.
apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
data:
  RAG_ENV: "sandbox"
  RAG_LOG_LEVEL: "INFO"

  # In-cluster OpenSearch from 00-opensearch.yaml. Plain http with the security
  # plugin off, so no certs and no credentials.
  RAG_OPENSEARCH__HOSTS: "http://opensearch:9200"
  RAG_OPENSEARCH__VERIFY_CERTS: "false"
  RAG_OPENSEARCH__CA_CERTS: ""
  RAG_OPENSEARCH__NUM_SHARDS: "1"
  RAG_OPENSEARCH__NUM_REPLICAS: "0"

  # The sandbox's shared vLLM model. vLLM is OpenAI-compatible, so this is the
  # same provider and the same code path LiteLLM will use at work -- only the
  # URL and model name change. Served behind an OAuth proxy, hence the token in
  # the Secret and verify_ssl off for the internal certificate.
  RAG_LLM__PROVIDER: "openai_compatible"
  RAG_LLM__BASE_URL: "https://isvc-qwen3-8b-fp8-predictor.sandbox-shared-models.svc.cluster.local:8443/v1"
  RAG_LLM__MODEL: "isvc-qwen3-8b-fp8"
  RAG_LLM__VERIFY_SSL: "false"
  RAG_LLM__TIMEOUT_S: "180"
  # qwen3 is a reasoning model. Left alone it spends most of its output budget
  # thinking before it says anything: measured 17.8s of silence before the first
  # visible token, and 10.2s/257 tokens on a one-sentence question that takes
  # 0.9s/22 tokens with thinking off. Stripping the trace only hides the cost;
  # this removes it.
  #
  # vLLM-specific. LiteLLM at work may expose the same idea as
  # {"reasoning_effort":"low"} or may not need it at all if the model is not a
  # reasoning model -- an empty value here is the safe default.
  RAG_LLM__EXTRA_BODY: '{"chat_template_kwargs":{"enable_thinking":false}}'

  # Embeddings SERVED, not in-process -- this is the work configuration.
  # RemoteOpenAIEmbedder posts to {BASE_URL}/embeddings exactly as it will to
  # LiteLLM; only the URL and model name differ. Swapping to local_onnx here
  # would leave that whole path unexercised.
  #
  # DIM must match what the endpoint returns. It defines the OpenSearch vector
  # field and is fixed at index creation -- readiness fails loudly if it is
  # wrong, which is the check worth having on the first deploy at work.
  RAG_EMBEDDING__PROVIDER: "openai_compatible"
  RAG_EMBEDDING__BASE_URL: "http://embed-stub:8100/v1"
  RAG_EMBEDDING__MODEL: "bge-small-en-v1.5"
  RAG_EMBEDDING__DIM: "384"
  # The stub applies no prefix of its own, so bge's asymmetric query prefix is
  # still ours to send. Clear this for models that were not trained with one.
  RAG_EMBEDDING__QUERY_PREFIX: "Represent this sentence for searching relevant passages:"
  # Lowered from 32. Batch size is the main lever on peak memory at whatever
  # serves the embeddings; a large PDF fans out to hundreds of chunks and the
  # batches arrive back to back. Worth remembering if LiteLLM starts 5xx-ing
  # under a bulk backfill at work.
  RAG_EMBEDDING__BATCH_SIZE: "16"

  # OCR on: scanned documents are a core case, not an optional extra.
  RAG_OCR__ENABLED: "true"
  RAG_OCR__URL: "http://rag-ocr:9999"
  RAG_OCR__MIN_CHARS_PER_PAGE: "120"

  RAG_API_URL: "http://rag-api:8000"
  RAG_API__CORS_ORIGINS: ""
