apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-tika
  labels: { app: rag-tika, app.kubernetes.io/part-of: rag }
spec:
  replicas: 2
  selector:
    matchLabels: { app: rag-tika }
  template:
    metadata:
      labels: { app: rag-tika }
    spec:
      containers:
        - name: tika
          image: image-registry.openshift-image-registry.svc:5000/rag/tika:3.0.0.0-full
          ports:
            - { name: http, containerPort: 9998 }
          env:
            # Tika is a JVM; without an explicit heap it sizes from the node's
            # memory, not the pod limit, and gets OOM-killed under load.
            - name: JAVA_OPTS
              value: "-Xms512m -Xmx2g"
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "3Gi" }
          livenessProbe:
            httpGet: { path: /tika, port: http }
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /tika, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: rag-tika
spec:
  selector: { app: rag-tika }
  ports:
    - { name: http, port: 9998, targetPort: http }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-ocr
  labels: { app: rag-ocr, app.kubernetes.io/part-of: rag }
spec:
  # Scaled separately from everything else: OCR is the slowest and most
  # CPU-hungry stage, and it is only exercised during ingest.
  replicas: 1
  selector:
    matchLabels: { app: rag-ocr }
  template:
    metadata:
      labels: { app: rag-ocr }
    spec:
      containers:
        - name: ocr
          image: image-registry.openshift-image-registry.svc:5000/rag/rag-ocr:0.1.0
          ports:
            - { name: http, containerPort: 9999 }
          env:
            - { name: RAG_OCR__LANGUAGES, value: "en" }
            - { name: RAG_OCR__GPU, value: "false" }
            - { name: RAG_OCR__RENDER_DPI, value: "200" }
            # torch ignores cgroup CPU limits when sizing its thread pool.
            - { name: OMP_NUM_THREADS, value: "4" }
            - { name: MKL_NUM_THREADS, value: "4" }
          resources:
            # EasyOCR holds the detection and recognition models in memory;
            # 4 Gi is the practical floor for English.
            requests: { cpu: "1", memory: "3Gi" }
            limits:   { cpu: "4", memory: "6Gi" }
          startupProbe:
            # Model loading is slow. 5 minutes of grace before liveness applies.
            httpGet: { path: /health, port: http }
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 15
            timeoutSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 4Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: rag-ocr
spec:
  selector: { app: rag-ocr }
  ports:
    - { name: http, port: 9999, targetPort: http }
