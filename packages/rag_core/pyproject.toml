[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rag-core"
version = "0.1.0"
description = "Shared config, retrieval, embedding and indexing primitives for the RAG platform"
requires-python = ">=3.11,<3.13"

# Deliberately minimal. Every entry must be vendorable as a wheel for the
# air-gapped environment. Do not add transitive-heavy packages here; in
# particular nothing that pulls torch (that lives only in services/ocr).
dependencies = [
    "pydantic>=2.7,<3",
    "pydantic-settings>=2.3,<3",
    "httpx>=0.27,<0.29",
    "opensearch-py>=2.6,<3",
    "onnxruntime>=1.18,<2",
    "tokenizers>=0.19,<1",
    "numpy>=1.26,<3",
]

[tool.setuptools.packages.find]
where = ["src"]
