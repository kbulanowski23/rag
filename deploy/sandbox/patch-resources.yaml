# Trim requests to fit the sandbox's 3-CPU request quota. Limits stay generous
# because the quota's limit ceiling is 30Gi and unused limit costs nothing.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
spec:
  template:
    spec:
      containers:
        - name: api
          resources:
            requests: { cpu: "200m", memory: 1Gi }
            limits:   { cpu: "2",    memory: 2Gi }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-web
spec:
  template:
    spec:
      containers:
        - name: web
          resources:
            requests: { cpu: "50m", memory: 256Mi }
            limits:   { cpu: "1",   memory: 512Mi }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-tika
spec:
  template:
    spec:
      containers:
        - name: tika
          resources:
            requests: { cpu: "200m", memory: 1Gi }
            limits:   { cpu: "2",    memory: 3Gi }
---
# EasyOCR holds the detection and recognition models resident. Memory is the
# real constraint; the CPU request is trimmed to fit the sandbox's 3-CPU quota,
# which only makes OCR slower, not broken.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-ocr
spec:
  template:
    spec:
      containers:
        - name: ocr
          resources:
            requests: { cpu: "500m", memory: 3Gi }
            limits:   { cpu: "2",    memory: 5Gi }
---
# imagePullPolicy: Always, because the sandbox deploys the MUTABLE :latest tag.
# The base sets IfNotPresent, which is correct at work where the pipeline
# deploys an immutable per-commit tag. Here it meant a node that had already
# cached :latest silently kept serving the old image: `oc rollout restart`
# reported success, the pods came up healthy, and the code was the previous
# build. The only symptom was that a fix "did not work".
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
spec:
  template:
    spec:
      containers:
        - name: api
          imagePullPolicy: Always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-web
spec:
  template:
    spec:
      containers:
        - name: web
          imagePullPolicy: Always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-ocr
spec:
  template:
    spec:
      containers:
        - name: ocr
          imagePullPolicy: Always
